spring.application.name=LoginAndRegister

# ===============================
# SERVER
# ===============================
server.port=8081
server.servlet.context-path=/api

# ===============================
# DATASOURCE - ORACLE
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP (Connection Pool - default Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool-Auth

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=VERY_SECURE_256_BIT_SECRET_KEY_CHANGE_IN_PRODUCTION
jwt.expiration=3600000

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.com.example.auth=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# ACTUATOR (Optional Production Monitoring)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000